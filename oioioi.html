<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Flip A Lero</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #050505;
  color: white;
  font-family: Arial, sans-serif;

  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  overflow: hidden;
}

/* smoother + faster grid */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;

  background-image:
    linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);

  background-size: 50px 50px;

  animation: gridMove 8s linear infinite;
  z-index: 0;
}

@keyframes gridMove {
  from { transform: translate3d(0,0,0); }
  to { transform: translate3d(-50px,-50px,0); }
}

/* content */
.container {
  position: relative;
  z-index: 1;
}

/* title */
h1 {
  font-size: 38px;
  letter-spacing: 1px;
  text-shadow: 0 0 8px rgba(255,255,255,0.2);
}

/* images */
img {
  width: 220px;
  height: 220px;
  border-radius: 18px;
  object-fit: cover;
  margin: 20px;

  transition: all 0.35s cubic-bezier(.22,1,.36,1);

  box-shadow:
    0 0 12px rgba(255,255,255,0.08),
    0 0 20px rgba(0,255,255,0.08);
}

/* active winner */
.active {
  transform: scale(1.06);
  box-shadow:
    0 0 16px rgba(0,255,255,0.25),
    0 0 30px rgba(0,255,255,0.15);
}

/* loser */
.dim {
  opacity: 0.25;
  transform: scale(0.96);
}

/* button */
button {
  padding: 14px 34px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  cursor: pointer;

  background: #0a0a0a;
  color: white;

  box-shadow:
    0 0 10px rgba(255,255,255,0.08);

  transition: all 0.25s cubic-bezier(.22,1,.36,1);
}

button:hover {
  transform: translateY(-2px) scale(1.04);
  box-shadow:
    0 6px 20px rgba(0,255,255,0.15);
}

/* result */
#result {
  margin-top: 28px;
  font-size: 24px;
  opacity: 0.85;
  transition: all 0.3s ease;
}

/* smoother flip */
.flip {
  animation: flipSmooth 0.5s cubic-bezier(.22,1,.36,1);
}

@keyframes flipSmooth {
  0% { transform: rotateY(0deg) scale(1); }
  50% { transform: rotateY(180deg) scale(1.08); }
  100% { transform: rotateY(360deg) scale(1); }
}
</style>
</head>

<body>

<div class="container">
  <h1>Flip A Lero</h1>

  <div>
    <img id="img1" src="https://static-cdn.jtvnw.net/jtv_user_pictures/67f029da-24d9-4797-b77e-ce0816716b52-profile_image-300x300.png">
    <img id="img2" src="https://i.imgur.com/L3Mv9Mv.jpeg">
  </div>

  <button onclick="flipCoin()">Flip</button>

  <div id="result"></div>
</div>

<script>
function flipCoin() {
  const result = Math.random() < 0.5 ? 0 : 1;

  const img1 = document.getElementById("img1");
  const img2 = document.getElementById("img2");
  const resultText = document.getElementById("result");

  img1.classList.remove("active", "dim", "flip");
  img2.classList.remove("active", "dim", "flip");

  // trigger smooth animation
  requestAnimationFrame(() => {
    img1.classList.add("flip");
    img2.classList.add("flip");
  });

  setTimeout(() => {
    if (result === 0) {
      img1.classList.add("active");
      img2.classList.add("dim");
      resultText.innerText = "LEFT WINS";
    } else {
      img2.classList.add("active");
      img1.classList.add("dim");
      resultText.innerText = "RIGHT WINS";
    }
  }, 250);
}
</script>

</body>
</html>
